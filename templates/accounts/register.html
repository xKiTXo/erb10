{%extends "base.html"%}
{%block content %}
<section id="login" class="auth-shell py-5">
    <div class="container">
    <div class="row">
        <div class="col-md-7 mx-auto">
        <div class="card">
            <div class="card-header text-white py-3">
            <h4 class="mb-0"><i class="fas fa-user-plus"></i> Join Food Agent</h4>
            </div>
            <div class="card-body p-4">
            <p class="text-muted">Create an account to save favorite restaurants, book tables, and get tailored recommendations.</p>
            <form action="index.html">
                <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="first_name">First Name</label>
                    <input type="text" name="first_name" class="form-control" required />
                </div>
                <div class="form-group col-md-6">
                    <label for="last_name">Last Name</label>
                    <input type="text" name="last_name" class="form-control" required />
                </div>
                </div>
                <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" class="form-control" required />
                </div>
                <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" class="form-control" required />
                </div>
                <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" name="password2" class="form-control" required />
                </div>
                <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="terms" />
                <label class="form-check-label" for="terms">I agree to the terms and privacy policy</label>
                </div>
                <input type="submit" value="Create Account" class="btn btn-danger btn-block" />
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Already have an account? <a href={%url "accounts:login"%} class="text-danger">Log in</a></small>
            </div>
            </div>
        </div>
        </div>
    </div>
    </div>
</section>
{%endblock%}
