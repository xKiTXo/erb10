{%extends "base.html"%}
{%block content %}
<section id="login" class="auth-shell py-5">
    <div class="container">
    <div class="row">
        <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header text-white py-3">
            <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Welcome Back</h4>
            </div>
            <div class="card-body p-4">
            <p class="text-muted">Sign in to save restaurants, manage reservations, and discover new favorites.</p>
            <form action="index.html">
                <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" class="form-control" required />
                </div>

                <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" class="form-control" required />
                </div>

                <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="remember" />
                <label class="form-check-label" for="remember">Remember me</label>
                </div>

                <input type="submit" value="Log In" class="btn btn-danger btn-block" />
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Don’t have an account? <a href={%url "accounts:register"%} class="text-danger">Register here</a></small>
            </div>
            </div>
        </div>
        </div>
    </div>
    </div>
</section>
{%endblock%}
